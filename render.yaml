services:
  # Frontend: Vite React SPA
  - type: static_site
    name: mpc-mv-frontend
    env: node
    buildCommand: npm ci && npm run build
    outputDir: dist/
    envVars:
      - key: VITE_API_BASE_URL
        service: mpc-mv-backend
        property: url
      - key: VITE_NODE_ENV
        value: production

  # Backend: Node.js API
  - type: web
    name: mpc-mv-backend
    env: node
    rootDir: backend/
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mpc-mv-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: mpc-mv-frontend
          type: web
          property: url

databases:
  - name: mpc-mv-db
    databaseName: mpc_production
    user: mpc_user

