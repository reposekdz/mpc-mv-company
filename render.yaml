services:
  # Frontend: Vite React SPA (Static Site)
  - type: web
    name: mpc-mv-frontend
    env: node
    plan: static-site
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/
    envVars:
      - key: VITE_NODE_ENV
        value: production
  # Backend: Node.js API
  - type: web
    name: mpc-mv-backend
    env: node
    rootDir: backend/
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mpc-mv-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://mpc-mv-company-ltd.onrender.com

databases:
  - name: mpc-mv-db
    databaseName: mpc_production
    user: mpc_user

